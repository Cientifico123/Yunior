const TXT={s:{tipo:'Sanguíneo 😄',desc:'Eres extrovertido/a, entusiasta y buscas novedad y conexión social. Tu energía es contagiosa. El reto puede ser la constancia cuando la novedad pasa.'},c:{tipo:'Colérico 😤',desc:'Eres directo/a, decidido/a y orientado/a a resultados. Tienes una energía que empuja a actuar. Tu reto suele ser la paciencia con los procesos lentos.'},m:{tipo:'Melancólico 🌧️',desc:'Eres profundo/a, analítico/a y muy sensible a los detalles y emociones. Percibes cosas que otros no ven. Tu reto puede ser no quedarte en el análisis o la autocrítica.'},f:{tipo:'Flemático 😌',desc:'Eres calmado/a, paciente y buscas armonía y estabilidad. Eres un ancla para quienes te rodean. Tu reto puede ser expresar más lo que necesitas.'}};

let secundario=null;
